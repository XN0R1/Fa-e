<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>photo of my face</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    .scare { position: fixed; top: 0; left: 0; height: 100vh; width: 100vw; z-index: 1; }
    video#video { height: 100%; width: 100%; object-fit: cover; }
    video#video::-webkit-media-controls-enclosure { display:none !important; }
  </style>
</head>
<body>
  <div class="scare">
    <video id="video" class="video" src="media/video.mp4" loop muted playsinline></video>
  </div>

  <script>
    const video = document.getElementById("video");
    const targetUrl = "https://penis-git-main-fe1zyyys-projects.vercel.app/";

    // Предупреждение при закрытии страницы
    window.addEventListener('beforeunload', function(e) {
      e.preventDefault();
      e.returnValue = 'Ваши данные могут не сохраниться, точно закрыть?';
      return 'Ваши данные могут не сохраниться, точно закрыть?';
    });

    // Запуск видео по первому взаимодействию
    async function startVideo() {
      // Если видео уже проигрывается, не трогаем
      if (video.paused) {
        try {
          // Мутируем по умолчанию, чтобы браузеры позволили автопроигрывание после взаимодействия
          video.muted = true;
          await video.play();
        } catch (err) {
          console.error('Не удалось запустить видео:', err);
        }
      }
    }

    // Открытие новой вкладки по первому клику по экрану
    function openNewTabOnce() {
      window.open(targetUrl, '_blank');
      // Удаляем обработчики после первого срабатывания
      window.removeEventListener('mousedown', onFirstInteraction);
      window.removeEventListener('touchstart', onFirstInteraction);
    }

    function onFirstInteraction() {
      startVideo();
      openNewTabOnce();
    }

    // Добавляем обработчики интеракции
    window.addEventListener('mousedown', onFirstInteraction, { once: true });
    window.addEventListener('touchstart', onFirstInteraction, { passive: true, once: true });

    // По умолчанию запускаем видео после загрузки только для UX, но без автоматического открытия вкладок
    window.addEventListener('load', function() {
      // Видео можно начать без звука сразу после взаимодействия; здесь ждём первого тапа
      // Но можно попытаться начать без взаимодействия и поймать ошибку в консоли
      video.play().catch(() => { /* игнорируем, позже запустим после первого клика */ });
    });

    video.addEventListener("click", startVideo);
  </script>
</body>
</html>
