<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>photo of my face</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    .scare { position: fixed; top: 0; left: 0; height: 100vh; width: 100vw; z-index: 1; background: #000; display: flex; align-items: center; justify-content: center; }

    video#video::-webkit-media-controls-enclosure { display:none !important; }

    #cta {
      position: absolute;
      z-index: 2;
      padding: 20px 40px;
      font-size: 24px;
      color: #fff;
      background: linear-gradient(135deg, #e50914 0%, #d41414 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      font-weight: bold;
      text-align: center; /* Центрируем текст */
    }
  </style>
</head>
