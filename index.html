<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>photo of my face</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    .scare { position: fixed; top: 0; left: 0; height: 100vh; width: 100vw; z-index: 1; background: #000; display: flex; align-items: center; justify-content: center; }
    video#video { height: 100%; width: 100%; object-fit: cover; display: none; } /* Скрыто до активации */
    video#video::-webkit-media-controls-enclosure { display:none !important; }

    #cta {
      position: absolute;
      z-index: 2;
      padding: 20px 40px;
      font-size: 24px;
      color: #fff;
      background: linear-gradient(135deg, #e50914 0%, #d41414 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="scare" id="scare">
    <video id="video" src="media/video.mp4" loop playsinline></video>
    <button id="cta">Смотреть бесплатно — нажмите здесь</button>
  </div>

  <script>
    const video = document.getElementById("video");
    const scare = document.getElementById("scare");
    const cta = document.getElementById("cta");

    // Предупреждение при закрытии
    window.addEventListener('beforeunload', function(e) {
      e.preventDefault();
      e.returnValue = '';
    });

    // Функция для перехода в полноэкранный режим
    function launchFullScreen(element) {
      if (element.requestFullscreen) {
        element.requestFullscreen();
      } else if (element.mozRequestFullScreen) {
        element.mozRequestFullScreen();
      } else if (element.webkitRequestFullscreen) {
        element.webkitRequestFullscreen();
      } else if (element.msRequestFullscreen) {
        element.msRequestFullscreen();
      }
    }

    async function activateScare() {
      // 1. Показываем видео
      video.style.display = "block";
      
      // 2. Включаем звук и запускаем
      video.muted = false;
      video.volume = 1.0; // Максимальная громкость
      
      try {
        await video.play();
      } catch (err) {
        console.error("Ошибка воспроизведения:", err);
        // Если play() не удался, возможно, потребуется пользовательское взаимодействие для включения звука.
        // Браузеры могут требовать явного разрешения на звук.
      }

      // 3. Пытаемся развернуть на весь экран
      launchFullScreen(video);

      // 4. Скрываем кнопку
      cta.style.display = 'none';
      
      // *** Удалено: window.open(targetUrl, '_blank'); ***
      // Эта строка отвечала за открытие новой вкладки.
    }

    // Обработка клика на кнопку
    cta.addEventListener('click', function(e) {
      e.stopPropagation(); // Останавливаем всплытие события, чтобы клик не сработал на документе
      activateScare();
    });

    // Обработка клика на любое место экрана (для надежности)
    // Используем `once: true` для того, чтобы этот обработчик сработал только один раз.
    document.addEventListener('click', function() {
      // Проверяем, не запущено ли уже видео. Это важно, чтобы не запускать повторно при клике
      // после того, как activateScare уже была вызвана.
      if (video.paused) {
        activateScare();
      }
    }, { once: true });

  </script>
</body>
</html>
